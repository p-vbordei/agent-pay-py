name: Publish to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi  # configured in repo settings; matches PyPI Trusted Publisher entry
    permissions:
      id-token: write  # OIDC token for Trusted Publishers
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Build distributions
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` — uses OIDC token automatically when Trusted Publisher is configured
